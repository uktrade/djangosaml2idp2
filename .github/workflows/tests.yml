# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "2.0.1"

jobs:
  test:

    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django-version: ["4.2", "5.1", "5.2"]

    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  ## v6.0.1
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 ## v6.1.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}
      id: setup-python

    - name: Install dependencies and testing utilities
      run: |
        sudo apt-get update && sudo apt-get install xmlsec1 -y
        python -m pip install --upgrade pip django-stubs mypy tox
        pip install pytest pytest-cov
        pip install poetry
        poetry env use python
        poetry lock
        poetry install

    - name: Ruff Format
      run: poetry run ruff format

    - name: Ruff Check
      run: poetry run ruff check

    - name: Test and Coverage
      run: |
        set -o pipefail
        poetry run pytest --junitxml=pytest.xml --cov --cov-report=term-missing:skip-covered | tee pytest-coverage.txt

    - name: Pytest Coverage Comment
      id: coverage
      uses: MishaKav/pytest-coverage-comment@dd5b80bde6d16941f336518e92929e89069d8451 ## v1.7.2
      with:
        pytest-coverage-path: pytest-coverage.txt
        junitxml-path: pytest.xml
